<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>拯救公猪 - 独立游戏开发档案</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: white;
            font-family: "Microsoft YaHei", sans-serif;
            user-select: none;
            -webkit-user-select: none; /* 禁用手机端默认选中 */
            touch-action: none; /* 禁用双击放大和默认滚动 */
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #111827, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated; 
            outline: none;
        }
        
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="260" tabindex="0"></canvas>
    <div class="scanlines"></div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.focus();

    // --- 游戏常数与状态 ---
    const HEIGHT = 260;
    const GROUND_Y = 210;
    const DINO_X = 320;
    
    const ACCELERATION = 0.00025; 
    const MAX_SPEED = 12.0;
    const SHIELD_COOLDOWN = 30000;

    let isPrologue = true;
    let prologueStartTime = 0;
    let isPaused = false;
    let isEndlessMode = false;
    let isStarted = false;
    let isOver = false;
    let isVictory = false;
    let victoryStartTime = 0;
    let thiefCrashed = false;
    let gameStartTime = 0; // 用于控制开局3秒无树木

    let gameSpeed = 3.5; 
    let score = 0;
    let screenShake = 0;
    let lives = 3;
    let isShieldActive = false;
    let shieldStartTime = 0;
    let lastShieldUseTime = -99999;
    let hitInvincibilityTime = 0;

    let currentOrcOffset = 350;
    let currentThiefOffset = -250;

    let dinoY = GROUND_Y - 44;
    let dinoVelY = 0;
    let isBlockingRight = false;
    let isBlockingLeft = false;

    let orcY = GROUND_Y - 44;
    let orcVelY = 0;
    let thiefY = GROUND_Y - 40;
    let thiefVelY = 0;
    let thiefThrowTimer = 0;

    let obstacles = [];
    let dust = [];
    let clouds = [];
    let bombs = [];
    let daggers = [];
    
    let bombCooldown = 200; 
    let daggerCooldown = 150;

    const rand = (max) => Math.floor(Math.random() * max);
    const fill = (r, g, b, a = 1) => ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
    
    for (let i = 0; i < 6; i++) clouds.push({ x: rand(1500), y: 30 + rand(50) });

    function resetGame() {
        score = 0; lives = 3;
        isShieldActive = false; shieldStartTime = 0; lastShieldUseTime = -99999; hitInvincibilityTime = 0;
        thiefCrashed = false; 
        gameSpeed = 3.5; 
        isStarted = true; isOver = false; isVictory = false; victoryStartTime = 0;
        dinoY = GROUND_Y - 44; dinoVelY = 0;
        orcY = GROUND_Y - 44; orcVelY = 0;
        thiefY = GROUND_Y - 40; thiefVelY = 0; thiefThrowTimer = 0;
        currentOrcOffset = 350; currentThiefOffset = -250;
        obstacles = []; dust = []; bombs = []; daggers = [];
        bombCooldown = 200; daggerCooldown = 150; 
    }

    function triggerStoryRestart() {
        isPrologue = true;
        prologueStartTime = 0;
        isEndlessMode = false;
        resetGame();
    }

    // --- 统一跳跃与点击处理 ---
    function handleTapOrSpace() {
        if (isPrologue) {
            if (Date.now() - prologueStartTime > 8500) { 
                isPrologue = false; 
                isEndlessMode = false; 
                gameStartTime = Date.now();
                resetGame(); 
            }
        } else if (isVictory) {
            if (Date.now() - victoryStartTime > 10000) { 
                isEndlessMode = true; 
                isPrologue = false; 
                isVictory = false; 
                gameStartTime = Date.now();
                resetGame(); 
            }
        } else if (isOver || !isStarted) {
            gameStartTime = Date.now();
            resetGame();
        } else if (dinoY >= GROUND_Y - 45) {
            // 【跳跃修改】降低初速度，配合较轻的重力，形成完美弧线
            dinoVelY = -14.5; 
            createDust(DINO_X + 10);
        }
    }

    // --- 键盘控制 ---
    canvas.addEventListener('keydown', (e) => {
        const code = e.code;
        if (code === 'Escape') {
            if (isVictory && (Date.now() - victoryStartTime > 10000)) triggerStoryRestart();
            else if (!isPrologue) isPaused = !isPaused;
            return;
        }

        if (isPaused) {
            if (code === 'Escape') isPaused = false;
            return;
        }

        if (code === 'Space' || code === 'ArrowUp') {
            handleTapOrSpace();
        }

        if (!isOver && isStarted && !isPrologue && !isPaused) {
            if (code === 'ArrowRight') { isBlockingRight = true; isBlockingLeft = false; }
            if (code === 'ArrowLeft') { isBlockingLeft = true; isBlockingRight = false; }
            if (code === 'ArrowDown') activateShield();
        }
    });

    canvas.addEventListener('keyup', (e) => {
        if (isVictory) return;
        if (e.code === 'ArrowRight') isBlockingRight = false;
        if (e.code === 'ArrowLeft') isBlockingLeft = false;
    });

    // --- 移动端触控适配 (点按跳跃，长按护盾/重置剧情) ---
    let touchTimer = null;
    let isLongPress = false;

    window.addEventListener('touchstart', (e) => {
        if (e.target === canvas) e.preventDefault(); 
        clearTimeout(touchTimer);
        isLongPress = false;

        touchTimer = setTimeout(() => {
            isLongPress = true; // 触发长按
            if (isVictory && (Date.now() - victoryStartTime > 10000)) {
                triggerStoryRestart();
            } else if (!isPrologue && !isPaused && !isOver && isStarted) {
                activateShield();
            }
        }, 400); // 长按判定时间 400ms
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
        if (e.target === canvas) e.preventDefault();
        clearTimeout(touchTimer);
        // 如果手指抬起时没有触发长按，则判定为短按 (跳跃/确认)
        if (!isLongPress && !isPaused) {
            handleTapOrSpace();
        }
    });

    function activateShield() {
        if (!isShieldActive && Date.now() - lastShieldUseTime > SHIELD_COOLDOWN) {
            isShieldActive = true; 
            shieldStartTime = Date.now(); 
            lastShieldUseTime = Date.now();
        }
    }

    // --- 游戏主循环 ---
    function gameLoop() {
        if (isStarted && !isOver && !isPrologue && !isPaused) {
            runBackgroundLogic();
        }
        render();
        requestAnimationFrame(gameLoop);
    }

    function runBackgroundLogic() {
        let t = Date.now();
        if (gameSpeed < MAX_SPEED) gameSpeed += ACCELERATION;
        score += (gameSpeed / 42.0);
        if (thiefThrowTimer > 0) thiefThrowTimer--;
        if (isShieldActive && (t - shieldStartTime > 10000)) isShieldActive = false;

        if (!isVictory) {
            if (isEndlessMode) {
                if (!thiefCrashed) currentThiefOffset = -220 + Math.cos(t / 600.0) * 50;
                currentOrcOffset = 320 + Math.sin(t / 800.0) * 60;
            } else {
                if (score < 500 && !thiefCrashed) {
                    currentThiefOffset = -220 + Math.cos(t / 600.0) * 50;
                } else if (score >= 500 && !thiefCrashed) {
                    let thiefRealX = DINO_X + currentThiefOffset;
                    for (let ob of obstacles) {
                        if (ob.x > thiefRealX && ob.x < thiefRealX + 150) {
                            currentThiefOffset += 18;
                            thiefRealX = DINO_X + currentThiefOffset;
                            if (thiefRealX + 15 >= ob.x) {
                                thiefCrashed = true; ob.hasCrashedThief = true; createDust(ob.x);
                            }
                            break;
                        }
                    }
                }
                if (score < 1000) {
                    currentOrcOffset = 320 + Math.sin(t / 800.0) * 60;
                } else {
                    let orcRealX = DINO_X + currentOrcOffset;
                    let target = obstacles.find(ob => ob.x > orcRealX);
                    if (!target) { target = { x: canvas.width + 100, y: GROUND_Y - 60, isKnockedDown: false, hasCrashedThief: false }; obstacles.push(target); }
                    currentOrcOffset += 20;
                    orcRealX = DINO_X + currentOrcOffset;
                    if (orcRealX + 30 >= target.x) {
                        isVictory = true; isOver = true; victoryStartTime = Date.now();
                        dinoY = GROUND_Y - 44; dinoVelY = 0; createDust(target.x); bombs = []; daggers = [];
                    }
                }
            }
        }

        updatePhysics(); handleAIAndEnemies(); handleCollisions();
        if (screenShake > 0) screenShake--;
    }

    function updatePhysics() {
        dinoY += dinoVelY;
        // 【物理修改】重力从 0.88 削弱为 0.75，提供更舒服的滞空时间
        if (dinoY < GROUND_Y - 44) dinoVelY += 0.75; 
        else {
            if (dinoVelY > 5) { screenShake = 6; createDust(DINO_X + 10); }
            dinoY = GROUND_Y - 44; dinoVelY = 0;
        }

        orcY += orcVelY;
        if (orcY < GROUND_Y - 44) orcVelY += 0.75; else { orcY = GROUND_Y - 44; orcVelY = 0; }

        if (!thiefCrashed) {
            thiefY += thiefVelY;
            if (thiefY < GROUND_Y - 40) thiefVelY += 0.75; else { thiefY = GROUND_Y - 40; thiefVelY = 0; }
        }
    }

    function handleAIAndEnemies() {
        let orcRealX = DINO_X + currentOrcOffset;
        let thiefRealX = DINO_X + currentThiefOffset;
        
        if (isEndlessMode || score < 1000) {
            if (bombCooldown > 0) bombCooldown--;
            if (bombCooldown <= 0 && rand(100) < 2) { 
                bombs.push({ x: orcRealX, y: orcY, vx: -2.0 - Math.random() * 1.5, vy: -7, onGround: false }); 
                bombCooldown = 180 + rand(100); 
            }
            if (isEndlessMode || score < 950) {
                for (let ob of obstacles) { if (ob.x > orcRealX && ob.x < orcRealX + 140 && orcY >= GROUND_Y - 45) { orcVelY = -15; break; } }
            }
        }
        if ((isEndlessMode || score > 100) && !thiefCrashed) {
            if ((isEndlessMode || score < 470) && thiefY >= GROUND_Y - 40 && rand(100) < 2) thiefVelY = -15.0;
            if (daggerCooldown > 0) daggerCooldown--;
            if (daggerCooldown <= 0 && rand(100) < 3) { 
                daggers.push({ x: thiefRealX + 20, y: thiefY + 12 }); 
                daggerCooldown = 150 + rand(80); 
                thiefThrowTimer = 15; 
            }
        }
    }

    function createDust(x) { for (let i = 0; i < 6; i++) dust.push({ x: x, y: GROUND_Y, vx: -3 - Math.random() * 2, vy: -Math.random(), life: 255 }); }
    
    function isIntersect(rect1, rect2) {
        return rect1.x < rect2.x + rect2.w && rect1.x + rect1.w > rect2.x && rect1.y < rect2.y + rect2.h && rect1.y + rect1.h > rect2.y;
    }

    function takeDamage() {
        if (isShieldActive || Date.now() - hitInvincibilityTime < 2000) return;
        lives--;
        if (lives <= 0) { isOver = true; screenShake = 20; } 
        else { hitInvincibilityTime = Date.now(); screenShake = 15; }
    }

    function handleCollisions() {
        // 【判定修改】骑士体型收缩，变薄变短
        let dinoHitbox = { x: DINO_X + 15, y: dinoY - 5, w: 12, h: 40 };

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let ob = obstacles[i];
            if (!isVictory) ob.x -= gameSpeed;
            
            // 【判定修改】树木判定极大削弱！现在仅有中间的树干(w:6, h:25)有伤害
            if (isIntersect({ x: ob.x + 14, y: ob.y + 35, w: 6, h: 25 }, dinoHitbox)) {
                if (isShieldActive) { if (!ob.isKnockedDown) { ob.isKnockedDown = true; score += 15; screenShake = 5; createDust(ob.x); } } 
                else if (!ob.isKnockedDown) takeDamage();
            }
            if (ob.x < -100) obstacles.splice(i, 1);
        }

        for (let i = bombs.length - 1; i >= 0; i--) {
            let b = bombs[i];
            if (!b.onGround) { b.x += b.vx; b.y += b.vy; b.vy += 0.5; if (b.y >= GROUND_Y - 15) { b.y = GROUND_Y - 15; b.onGround = true; } } 
            else b.x -= gameSpeed;
            if (b.x < -50) { bombs.splice(i, 1); continue; }
            if (isIntersect({ x: b.x + 3, y: b.y + 3, w: 9, h: 9 }, dinoHitbox)) {
                if (isShieldActive || isBlockingRight) { score += 10; screenShake = 3; } else takeDamage();
                bombs.splice(i, 1);
            }
        }

        for (let i = daggers.length - 1; i >= 0; i--) {
            let d = daggers[i];
            d.x += (gameSpeed + 0.5); 
            if (d.x > 1000) { daggers.splice(i, 1); continue; }
            if (isIntersect({ x: d.x, y: d.y, w: 16, h: 10 }, dinoHitbox)) {
                if (isShieldActive || isBlockingLeft) { score += 15; screenShake = 2; } else takeDamage();
                daggers.splice(i, 1);
            }
        }

        for (let p of clouds) {
            if (!isVictory) p.x -= (gameSpeed * 0.15);
            if (p.x < -150) { p.x = canvas.width + rand(300); p.y = 30 + rand(50); }
        }

        // 【开局修改】增加3秒保护期 (3000ms)，期间不生成树木
        if (!isVictory && (Date.now() - gameStartTime > 3000)) {
            if (rand(100) < 5 && (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 350)) {
                obstacles.push({ x: canvas.width, y: GROUND_Y - 60, isKnockedDown: false, hasCrashedThief: false });
            }
        }

        for (let i = dust.length - 1; i >= 0; i--) {
            let d = dust[i]; d.x += d.vx; d.y += d.vy; d.life -= 12;
            if (d.life <= 0) dust.splice(i, 1);
        }
    }

    // --- 渲染逻辑 ---
    function render() {
        ctx.clearRect(0, 0, canvas.width, HEIGHT);

        ctx.save();
        if (screenShake > 0) {
            let dx = rand(screenShake) - screenShake / 2;
            let dy = rand(screenShake) - screenShake / 2;
            ctx.translate(dx, dy);
        }

        drawFancyClouds();
        fill(120, 120, 120, 0.3);
        ctx.fillRect(0, GROUND_Y, canvas.width, 2);
        
        for (let ob of obstacles) drawObstacle(ob);

        if (!isPrologue) {
            for (let d of dust) { fill(200, 200, 200, d.life / 255); ctx.fillRect(d.x, d.y, 5, 5); }
            for (let b of bombs) drawBomb(b);
            for (let d of daggers) drawDagger(d);

            if (isVictory) {
                drawVictoryCutsceneForeground(Date.now() - victoryStartTime);
            } else if (!isOver) {
                let drawKnight = true;
                if (!isVictory && (Date.now() - hitInvincibilityTime < 2000)) { if ((Date.now() % 200) < 100) drawKnight = false; }
                if (drawKnight) drawDino(DINO_X, dinoY, isShieldActive);

                if (isShieldActive) {
                    let elapsed = Date.now() - shieldStartTime;
                    let drawShield = true;
                    if (elapsed > 7000) {
                        let cycle = elapsed > 9500 ? 100 : elapsed > 8500 ? 250 : 500;
                        if ((elapsed % cycle) < (cycle / 2)) drawShield = false;
                    }
                    if (drawShield) {
                        let angle = (elapsed % 300) / 300.0 * Math.PI * 2;
                        let cx = DINO_X + 15 + Math.cos(angle) * 40;
                        let cy = dinoY + 10 + Math.sin(angle) * 40;
                        ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle + Math.PI / 2);
                        drawVividShield(-10, -15);
                        ctx.restore();
                    }
                }
                if (isEndlessMode || score < 1000) drawOrcWithPig(DINO_X + currentOrcOffset, orcY);
                if ((isEndlessMode || score > 100) && !thiefCrashed) drawThief(DINO_X + currentThiefOffset, thiefY);
            }

            if (!isVictory) {
                for (let i = 0; i < 3; i++) drawUIHeart(30 + i * 35, 30, i < lives);
                ctx.font = "bold 14px Monospace";
                let timeSinceShield = Date.now() - lastShieldUseTime;
                if (timeSinceShield < SHIELD_COOLDOWN) {
                    fill(180, 180, 180); ctx.fillText("SHIELD CD: " + Math.floor((SHIELD_COOLDOWN - timeSinceShield) / 1000) + "s", 20, 65);
                } else {
                    fill(255, 255, 255); ctx.fillText("SHIELD READY [长按/DOWN]", 20, 65); // 文本更新
                }
                if (isEndlessMode) { fill(255, 100, 100); ctx.fillText("ENDLESS MODE", canvas.width - 180, 25); }
                fill(255, 255, 255); ctx.font = "bold 18px Monospace"; ctx.fillText(`SCORE: ${Math.floor(score).toString().padStart(5, '0')}`, canvas.width - 180, 45);
            }

            if (isOver && !isVictory) {
                fill(0, 0, 0, 0.6); ctx.fillRect(0, 0, canvas.width, HEIGHT);
                fill(255, 255, 255); ctx.font = "bold 18px Microsoft YaHei"; 
                // 死亡文本简化
                ctx.fillText("MISSION FAILED - 点按屏幕 / SPACE 重试", canvas.width / 2 - 170, HEIGHT / 2);
            }
        }

        if (isPrologue) drawPrologue();
        if (isPaused) drawPauseMenu();

        ctx.restore();
    }

    function drawObstacle(ob) {
        ctx.save();
        if (ob.isKnockedDown) { ctx.translate(ob.x + 10, ob.y + 65); ctx.rotate(Math.PI / 2); ctx.translate(-(ob.x + 10), -(ob.y + 65)); }
        fill(90, 55, 30); ctx.fillRect(ob.x + 10, ob.y + 30, 14, 35);
        fill(60, 35, 15); ctx.beginPath(); ctx.moveTo(ob.x+13, ob.y+30); ctx.lineTo(ob.x+13, ob.y+65); ctx.moveTo(ob.x+17, ob.y+35); ctx.lineTo(ob.x+17, ob.y+65); ctx.moveTo(ob.x+21, ob.y+30); ctx.lineTo(ob.x+21, ob.y+65); ctx.stroke();
        fill(30, 110, 50); drawPolygon([ob.x+17, ob.x-18, ob.x+52], [ob.y+25, ob.y+55, ob.y+55]); drawPolygon([ob.x+17, ob.x-13, ob.x+47], [ob.y+10, ob.y+40, ob.y+40]); drawPolygon([ob.x+17, ob.x-8, ob.x+42], [ob.y-5, ob.y+20, ob.y+20]);
        fill(50, 140, 70); drawPolygon([ob.x+17, ob.x+5, ob.x+29], [ob.y-5, ob.y+15, ob.y+15]);
        ctx.restore();
        if (ob.hasCrashedThief) drawDeadThiefBody(ob.x, ob.y + 60);
    }

    function drawPolygon(xs, ys) {
        ctx.beginPath(); ctx.moveTo(xs[0], ys[0]);
        for(let i=1; i<xs.length; i++) ctx.lineTo(xs[i], ys[i]);
        ctx.fill();
    }

    function drawBomb(b) {
        fill(0,0,0); ctx.fillRect(b.x, b.y, 15, 15); 
        ctx.beginPath(); ctx.arc(b.x+7.5, b.y+7.5, 7.5, 0, Math.PI*2); ctx.fill();
        fill(150,150,150); ctx.beginPath(); ctx.arc(b.x+5.5, b.y+5.5, 2.5, 0, Math.PI*2); ctx.fill();
        fill(180,50,50); ctx.fillRect(b.x+6, b.y-4, 3, 5);
        fill(255, 200 + rand(55), 0);
        for (let i = 0; i < 4; i++) ctx.fillRect(b.x + 7 + rand(10) - 5, b.y - 6 + rand(8) - 4, 2, 2);
        fill(255,255,255); ctx.fillRect(b.x + 7 + rand(4) - 2, b.y - 5 + rand(4) - 2, 2, 2);
    }

    function drawDagger(d) {
        ctx.save(); ctx.translate(d.x + 10, d.y + 5); ctx.rotate(Date.now() / 80.0);
        fill(200, 200, 205); drawPolygon([0, 12, 0], [-3, 0, 3]);
        fill(101, 67, 33); ctx.fillRect(-8, -2, 8, 4);
        fill(80, 80, 80); ctx.fillRect(-2, -4, 3, 8);
        ctx.restore();
    }

    function drawDino(x, y, hideShield) {
        let p = 3; let bodyYOffset = (!isVictory && (isBlockingRight || isBlockingLeft)) ? 3 : 0;
        fill(220, 40, 40); ctx.fillRect(x + 2*p, y - 6*p + bodyYOffset, 5*p, 2*p);
        fill(210, 210, 220); ctx.fillRect(x + 4*p, y - 4*p + bodyYOffset, 6*p, 6*p); ctx.fillRect(x + 3*p, y + 2*p + bodyYOffset, 7*p, 8*p);
        if (!hideShield) {
            if (!isVictory) {
                if (isBlockingRight) drawVividShield(x + 9*p, y - 1*p);
                else if (isBlockingLeft) drawVividShield(x - 5*p, y - 1*p);
                else drawBackShield(x + 7*p, y + 3*p);
            } else drawBackShield(x + 7*p, y + 3*p);
        }
        fill(80, 85, 100);
        let anim = Math.floor(Date.now() / 120) % 2;
        if (anim === 0 || isVictory || (isBlockingRight||isBlockingLeft)) { ctx.fillRect(x+4*p, y+10*p, 2*p, 3*p); ctx.fillRect(x+7*p, y+10*p, 2*p, 1*p); } 
        else { ctx.fillRect(x+4*p, y+10*p, 2*p, 1*p); ctx.fillRect(x+7*p, y+10*p, 2*p, 3*p); }
    }

    function drawVividShield(sx, sy) {
        let p = 3; if ((Date.now() % 400) > 200) sy += 1;
        let w = 6*p, h = 12*p;
        fill(170, 175, 185); drawPolygon([sx, sx+w, sx+w, sx+w/2, sx], [sy, sy, sy+h/2+p, sy+h, sy+h/2+p]);
        let inP = 2; fill(30, 60, 140); drawPolygon([sx+inP, sx+w-inP, sx+w-inP, sx+w/2, sx+inP], [sy+inP, sy+inP, sy+h/2+p, sy+h-2*inP, sy+h/2+p]);
        fill(255, 210, 40); ctx.fillRect(sx+w/2-1, sy+3*p, 2, h-6*p); ctx.fillRect(sx+p+1, sy+5*p, w-2*p-2, 2);
        let alpha = 40 + Math.sin(Date.now() / 150.0) * 20; fill(255, 255, 255, Math.max(0, alpha)/255);
        drawPolygon([sx, sx+w/2, sx+w/2, sx], [sy, sy, sy+h/2, sy+h/2+p]);
    }

    function drawBackShield(sx, sy) { let p = 3; fill(170, 175, 185); ctx.fillRect(sx, sy, 3*p, 7*p); fill(30, 60, 140); ctx.fillRect(sx+1, sy+1, 3*p-2, 7*p-2); }

    function drawOrcWithPig(x, y) {
        let p = 5; let walkFrame = Math.floor(Date.now() / 200) % 2;
        let bounce = walkFrame === 0 ? p : 0; let offsetY = -3*p - 6;
        fill(30, 30, 35);
        if (walkFrame === 0) { ctx.fillRect(x+3*p, y+10*p+offsetY, 2*p, 3*p); ctx.fillRect(x+7*p, y+11*p+offsetY, 3*p, 2*p); }
        else { ctx.fillRect(x+3*p, y+11*p+offsetY, 3*p, 2*p); ctx.fillRect(x+8*p, y+10*p+offsetY, 2*p, 3*p); }
        let px = x - 5*p, py = y - 7*p + bounce + offsetY;
        fill(220, 130, 150); ctx.fillRect(px, py+2*p, 16*p, 10*p);
        fill(255, 170, 190); ctx.fillRect(px+p, py+p, 14*p, 10*p);
        fill(255, 110, 140); ctx.fillRect(px-2*p, py+5*p, 4*p, 4*p);
        fill(60, 20, 30); ctx.fillRect(px-p, py+6*p, p, 2*p);
        fill(255, 255, 255); ctx.fillRect(px+3*p, py+3*p, 2*p, 2*p); ctx.fillRect(px+8*p, py+3*p, 2*p, 2*p);
        fill(0, 0, 0); ctx.fillRect(px+4*p, py+3*p, p, p);
        fill(255, 200, 0); ctx.fillRect(px+6*p, py-2*p, 5*p, p); ctx.fillRect(px+6*p, py-3*p, p, p); ctx.fillRect(px+8*p, py-4*p, p, 2*p); ctx.fillRect(px+10*p, py-3*p, p, p);
        fill(30, 30, 35); ctx.fillRect(x+2*p, y+5*p+offsetY, 10*p, 5*p);
        let hx = x+10*p, hy = y+5*p+offsetY; ctx.fillRect(hx, hy, 5*p, 4*p);
        fill(240, 190, 150); ctx.fillRect(hx+2*p, hy+p, 3*p, 2*p);
        fill(0, 0, 0); let eyeShift = Math.floor(Date.now() / 400 % 2); ctx.fillRect(hx+2*p+eyeShift, hy+p, 1, 1); ctx.fillRect(hx+4*p, hy+p, 1, 1);
        fill(101, 67, 33); ctx.fillRect(px+5*p, py, p, 12*p); ctx.fillRect(px+11*p, py, p, 11*p);
        fill(240, 190, 150); ctx.fillRect(x+p, y+7*p+bounce+offsetY, 2*p, 2*p);
    }

    function drawThief(x, y) {
        let p = 3; let t = Math.floor(Date.now() / 150);
        ctx.save(); let cx = x + 4*p, cy = y + 5*p; ctx.translate(cx, cy);
        let inAir = (thiefY < GROUND_Y - 40);
        if (inAir) ctx.rotate((Date.now() % 600) / 600.0 * 2 * Math.PI); else if (t % 2 === 0) ctx.translate(0, 2);
        let rx = -4*p, ry = -5*p;
        fill(100, 80, 60); ctx.fillRect(rx+p, ry+2*p, 5*p, 7*p);
        fill(40, 60, 50); ctx.fillRect(rx-2*p, ry+2*p, 3*p, 6*p); ctx.fillRect(rx+p, ry-3*p, 6*p, 4*p);
        fill(240, 190, 150); ctx.fillRect(rx+2*p, ry-p, 4*p, 3*p);
        fill(20, 20, 20); ctx.fillRect(rx+2*p, ry, 4*p, p);
        fill(255, 255, 255); ctx.fillRect(rx+4*p, ry, p, p);
        fill(50, 40, 30);
        if (inAir) { ctx.fillRect(rx+p, ry+9*p, 2*p, 2*p); ctx.fillRect(rx+5*p, ry+7*p, 2*p, 2*p); }
        else { if (t % 2 === 0) ctx.fillRect(rx+2*p, ry+9*p, 2*p, 2*p); else ctx.fillRect(rx+5*p, ry+9*p, 2*p, 2*p); }
        if (thiefThrowTimer > 0) { fill(100, 80, 60); ctx.fillRect(rx+6*p, ry+3*p, 4*p, 2*p); fill(240, 190, 150); ctx.fillRect(rx+10*p, ry+3*p, p, 2*p); }
        else { fill(100, 80, 60); if (inAir) ctx.fillRect(rx+2*p, ry+4*p, 2*p, 3*p); else { if (t%2===0) ctx.fillRect(rx+3*p, ry+4*p, 2*p, 3*p); else ctx.fillRect(rx+5*p, ry+4*p, 2*p, 3*p); } }
        ctx.restore();
    }

    function drawDeadThiefBody(dx, dy) {
        let p = 3; fill(40, 60, 50); ctx.fillRect(dx-5*p, dy-7*p, 7*p, 7*p);
        fill(50, 40, 30); ctx.fillRect(dx+2*p, dy-2*p, 6*p, 2*p);
        fill(240, 190, 150); ctx.fillRect(dx-2*p, dy-11*p, 5*p, 5*p);
        fill(20, 20, 20); ctx.fillRect(dx-2*p, dy-10*p, 5*p, 2*p);
        fill(255, 255, 255); ctx.beginPath(); ctx.moveTo(dx-1*p, dy-10*p); ctx.lineTo(dx, dy-9*p); ctx.moveTo(dx, dy-10*p); ctx.lineTo(dx-1*p, dy-9*p); ctx.stroke();
        let t = Math.floor(Date.now() / 200); fill(255, 210, 40);
        if (t % 2 === 0) { ctx.fillRect(dx-4*p, dy-15*p, p, p); ctx.fillRect(dx+3*p, dy-13*p, p, p); }
        else { ctx.fillRect(dx-1*p, dy-16*p, p, p); ctx.fillRect(dx-5*p, dy-12*p, p, p); }
    }

    function drawDeadBlackThiefBody(dx, dy) {
        let p = 3; fill(30, 30, 35); ctx.fillRect(dx-5*p, dy-7*p, 7*p, 7*p); ctx.fillRect(dx+2*p, dy-2*p, 6*p, 2*p);
        fill(240, 190, 150); ctx.fillRect(dx-2*p, dy-11*p, 5*p, 5*p);
        fill(30, 30, 35); ctx.fillRect(dx-2*p, dy-12*p, 5*p, 2*p);
        fill(0, 0, 0); ctx.beginPath(); ctx.moveTo(dx-1*p, dy-10*p); ctx.lineTo(dx, dy-9*p); ctx.moveTo(dx, dy-10*p); ctx.lineTo(dx-1*p, dy-9*p); ctx.stroke();
        let t = Math.floor(Date.now() / 200); fill(255, 210, 40);
        if (t % 2 === 0) { ctx.fillRect(dx-4*p, dy-15*p, p, p); ctx.fillRect(dx+3*p, dy-13*p, p, p); }
        else { ctx.fillRect(dx-1*p, dy-16*p, p, p); ctx.fillRect(dx-5*p, dy-12*p, p, p); }
    }

    function drawMonkeyLeftFacing(x, y) {
        let p = 3; fill(139, 69, 19); ctx.fillRect(x+2*p, y-3*p, 2*p, 3*p); ctx.fillRect(x+6*p, y-3*p, 2*p, 3*p); ctx.fillRect(x+2*p, y-10*p, 6*p, 7*p);
        fill(222, 184, 135); ctx.fillRect(x+3*p, y-8*p, 3*p, 4*p);
        fill(139, 69, 19); ctx.fillRect(x+1*p, y-16*p, 8*p, 6*p);
        fill(222, 184, 135); ctx.fillRect(x+1*p, y-15*p, 6*p, 4*p);
        fill(0, 0, 0); ctx.fillRect(x+2*p, y-14*p, p, p); ctx.fillRect(x+4*p, y-14*p, p, p);
        fill(139, 69, 19); ctx.fillRect(x+8*p, y-9*p, 2*p, 5*p); ctx.fillRect(x+9*p, y-8*p, 3*p, 2*p); ctx.fillRect(x+12*p, y-9*p, 2*p, 4*p); ctx.fillRect(x+13*p, y-12*p, 2*p, 4*p); ctx.fillRect(x+10*p, y-14*p, 3*p, 2*p); ctx.fillRect(x+9*p, y-13*p, 2*p, 2*p);
    }

    function drawStandalonePig(px, py) {
        let p = 5; py = py - 7*p + 5;
        fill(220, 130, 150); ctx.fillRect(px, py+2*p, 16*p, 10*p);
        fill(255, 170, 190); ctx.fillRect(px+p, py+p, 14*p, 10*p);
        fill(255, 110, 140); ctx.fillRect(px-2*p, py+5*p, 4*p, 4*p);
        fill(60, 20, 30); ctx.fillRect(px-p, py+6*p, p, 2*p);
        fill(255, 255, 255); ctx.fillRect(px+3*p, py+3*p, 2*p, 2*p); ctx.fillRect(px+8*p, py+3*p, 2*p, 2*p);
        fill(0, 0, 0); ctx.fillRect(px+4*p, py+3*p, p, p);
        fill(255, 200, 0); ctx.fillRect(px+6*p, py-2*p, 5*p, p); ctx.fillRect(px+6*p, py-3*p, p, p); ctx.fillRect(px+8*p, py-4*p, p, 2*p); ctx.fillRect(px+10*p, py-3*p, p, p);
    }

    function drawUIHeart(x, y, active) {
        let p = 2; fill(active ? 255 : 100, active ? 50 : 100, active ? 80 : 100, active ? 1 : 0.6);
        ctx.fillRect(x-2*p, y-2*p, 2*p, 2*p); ctx.fillRect(x+2*p, y-2*p, 2*p, 2*p); ctx.fillRect(x-3*p, y-p, 8*p, 3*p); ctx.fillRect(x-2*p, y+2*p, 6*p, 2*p); ctx.fillRect(x-p, y+4*p, 4*p, 2*p); ctx.fillRect(x, y+6*p, 2*p, 2*p);
    }
    
    function drawAlphaHeart(x, y, alpha) {
        let p = 2; fill(255, 50, 80, alpha/255);
        ctx.fillRect(x-2*p, y-2*p, 2*p, 2*p); ctx.fillRect(x+2*p, y-2*p, 2*p, 2*p); ctx.fillRect(x-3*p, y-p, 8*p, 3*p); ctx.fillRect(x-2*p, y+2*p, 6*p, 2*p); ctx.fillRect(x-p, y+4*p, 4*p, 2*p); ctx.fillRect(x, y+6*p, 2*p, 2*p);
    }

    function drawFancyClouds() {
        for (let p of clouds) {
            fill(230, 230, 230, 0.7);
            ctx.beginPath(); ctx.arc(p.x+30, p.y+20, 10, 0, Math.PI*2); ctx.arc(p.x+42, p.y+12, 12, 0, Math.PI*2); ctx.arc(p.x+60, p.y+15, 10, 0, Math.PI*2); ctx.fill();
            fill(255, 255, 255, 0.85);
            ctx.beginPath(); ctx.arc(p.x+28, p.y+18, 10, 0, Math.PI*2); ctx.arc(p.x+40, p.y+10, 12, 0, Math.PI*2); ctx.arc(p.x+58, p.y+13, 10, 0, Math.PI*2); ctx.fill();
        }
    }

    function drawVictoryCutsceneForeground(elapsed) {
        let crashTree = obstacles.length > 0 ? obstacles[obstacles.length-1] : null;
        let crashX = crashTree ? crashTree.x : canvas.width - 150;
        let pigLandX = crashX - 70, pigLandY = GROUND_Y - 5;
        let pigX = pigLandX, pigY = pigLandY, knightX = DINO_X;

        if (elapsed > 2000 && elapsed < 6500) knightX = DINO_X + (elapsed - 2000) / 4500.0 * (pigX - 16 - DINO_X);
        else if (elapsed >= 6500) knightX = pigX - 16;

        drawDino(knightX, dinoY, elapsed >= 6000);
        drawDeadBlackThiefBody(crashX - 10, GROUND_Y - 5);

        if (elapsed < 1000) { let t = elapsed / 1000.0; pigX = crashX - t * 70; pigY = (GROUND_Y - 50) - Math.sin(t * Math.PI) * 40; }
        if (elapsed < 4500) drawStandalonePig(pigX, pigY - 25); else drawMonkeyLeftFacing(pigLandX, pigLandY);

        if (elapsed >= 6500) {
            let p = 3; fill(100, 50, 10); ctx.fillRect(pigLandX + 2*p, pigLandY - 7*p, -5*p, 2*p); ctx.fillRect(pigLandX - 3*p, pigLandY - 7*p, 2*p, 3*p);
            fill(180, 180, 190); ctx.fillRect(knightX + 5*p, dinoY - 1*p, 6*p, 2*p); ctx.fillRect(knightX + 11*p, dinoY - 1*p, 2*p, 3*p);
        }

        if (elapsed > 3500 && elapsed < 5000) {
            for (let i = 0; i < 25; i++) {
                fill(Math.random() > 0.5 ? 255 : 255, Math.random() > 0.5 ? 255 : 230, Math.random() > 0.5 ? 255 : 100);
                ctx.fillRect(pigLandX + rand(60) - 10, pigLandY - rand(90), 4, 4);
            }
        }

        if (elapsed >= 4500 && elapsed <= 5500) {
            let alpha = elapsed < 5000 ? (elapsed - 4500) / 500 : (5500 - Math.min(5500, elapsed)) / 500;
            fill(255, 255, 255, alpha); ctx.fillRect(0, 0, canvas.width, HEIGHT);
        }

        if (elapsed > 6500) {
            let maxHearts = Math.floor((elapsed - 6500) / 300);
            for (let i = 0; i <= maxHearts; i++) {
                let lifeTime = (elapsed - 6500) - (i * 300);
                if (lifeTime < 2500) {
                    let floatUp = lifeTime / 15, wobble = Math.sin(lifeTime / 150.0) * 15;
                    drawAlphaHeart(knightX + 18 + wobble, pigLandY - 30 - floatUp, Math.max(0, 255 - lifeTime * 255 / 2500));
                }
            }
        }

        if (elapsed > 8000) {
            let textAlpha = Math.min(1, (elapsed - 8000) / 2550);
            fill(180, 20, 60, textAlpha); ctx.font = "bold 22px Microsoft YaHei";
            ctx.textAlign = "center";
            ctx.fillText("魔法解除！被抓走的公猪原来是一只猿猴！", canvas.width/2, HEIGHT/2 - 70);
            ctx.fillText("骑士和猿猴从此幸福地相拥在一起~", canvas.width/2, HEIGHT/2 - 40);
            
            // 结局长按重置文本修改
            if (elapsed > 10000) {
                fill(150, 150, 150, textAlpha); ctx.font = "16px Microsoft YaHei";
                ctx.fillText("- 点按屏幕 / SPACE 开始无尽模式 -", canvas.width/2, HEIGHT/2 + 30);
                ctx.fillText("- 长按屏幕 / ESC 重温剧情 -", canvas.width/2, HEIGHT/2 + 60);
            }
            ctx.textAlign = "left";
        }
    }

    function drawPrologue() {
        if (prologueStartTime === 0) prologueStartTime = Date.now();
        let elapsed = Date.now() - prologueStartTime;

        fill(15, 15, 25, 0.8); ctx.fillRect(0, 0, canvas.width, HEIGHT);
        let startY = 60; 

        if (elapsed > 500) { 
            ctx.font = "bold 18px Microsoft YaHei"; fill(255, 255, 255); 
            ctx.fillText("【一个月黑风高的夜晚】", 60, startY); 
            drawPixelIcon("MOON", 300, startY - 15); 
        }
        if (elapsed > 2500) { 
            ctx.font = "bold 18px Microsoft YaHei"; fill(255, 255, 255); 
            ctx.fillText("小偷施展了魔法，把公主变成了一头猪，扛着就跑！", 60, startY + 40); 
            drawPixelIcon("MASKED_HEAD", 500, startY + 20); 
        }
        if (elapsed > 4500) { 
            ctx.font = "bold 18px Microsoft YaHei"; fill(255, 255, 255); 
            ctx.fillText("盗贼闻讯赶来，伺机阻挠...", 60, startY + 80); 
            drawPixelIcon("THIEF", 300, startY + 65); 
        }
        if (elapsed > 6500) { 
            ctx.font = "bold 18px Microsoft YaHei"; fill(255, 255, 255); 
            ctx.fillText("骑士来不及拿宝剑，轻装上阵开始追击", 60, startY + 120); 
            drawPixelIcon("CROSS_SHIELD", 390, startY + 115); 
        }
        if (elapsed > 8500) {
            if ((elapsed % 1000) > 500) {
                fill(255, 210, 40); ctx.font = "16px Microsoft YaHei"; 
                // 序章开始提示修改
                ctx.fillText("- 点按屏幕 / SPACE 开启追击 -", canvas.width/2 - 110, HEIGHT - 20);
            }
        }
    }

    function drawPauseMenu() {
        // 极度精简的暂停菜单
        fill(0, 0, 0, 0.82); ctx.fillRect(0, 0, canvas.width, HEIGHT);
        fill(255, 255, 255); ctx.font = "bold 22px Microsoft YaHei"; ctx.fillText("【 游戏暂停 】", canvas.width / 2 - 80, 100);
        fill(255, 210, 40); ctx.font = "16px Microsoft YaHei";
        ctx.fillText("[ ESC ] 恢复当前游戏", canvas.width / 2 - 85, 150);
    }

    function drawPixelIcon(type, x, y) {
        if (type === "MOON") { fill(255, 255, 180); ctx.beginPath(); ctx.arc(x+8, y+8, 8, 0, Math.PI*2); ctx.fill(); fill(15, 15, 25, 0.8); ctx.beginPath(); ctx.arc(x+12, y+6, 8, 0, Math.PI*2); ctx.fill(); }
        else if (type === "MASKED_HEAD") { fill(20, 20, 20); ctx.fillRect(x, y, 16, 16); fill(240, 190, 150); ctx.fillRect(x+4, y+6, 8, 4); fill(0, 0, 0); ctx.fillRect(x+5, y+7, 2, 2); ctx.fillRect(x+9, y+7, 2, 2); }
        else if (type === "THIEF") { fill(40, 60, 50); ctx.fillRect(x, y-5, 15, 10); fill(240, 190, 150); ctx.fillRect(x, y+5, 15, 8); fill(0, 0, 0); ctx.fillRect(x+3, y+7, 2, 2); ctx.fillRect(x+10, y+7, 2, 2); }
        else if (type === "CROSS_SHIELD") { drawVividShield(x, y - 10); }
    }

    requestAnimationFrame(gameLoop);

</script>
