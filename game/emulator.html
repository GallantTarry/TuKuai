<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tukuai Emulator Core</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4ade80;
            font-family: monospace;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
        /* 加一个友好的提示小条，过几秒自动消失 */
        #focus-hint {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #4ade80;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            z-index: 9999;
            animation: fadeout 4s forwards;
            animation-delay: 3s; /* 显示3秒后开始消失 */
        }
        @keyframes fadeout {
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

    <div id="focus-hint">💡 提示：按键无反应请先【点击游戏画面】。可点击底部手柄图标修改键位。</div>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const romFile = urlParams.get('rom');
        const coreParam = urlParams.get('core'); 

        if (!romFile) {
            document.body.innerHTML = `
                <div style="text-align:center; line-height: 2;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">⚠️</div>
                    <h3>SYSTEM ERROR: NO ROM DETECTED</h3>
                    <p style="color: #64748b; font-size: 12px;">Missing "?rom=filename" parameter in URL.</p>
                </div>
            `;
        } else {
            window.EJS_player = '#game';
            
            // 1. 动态判断模拟器核心
            let core = 'gba'; 
            if (coreParam) {
                core = coreParam; 
            } else {
                const ext = romFile.split('.').pop().toLowerCase();
                if (ext === 'sfc' || ext === 'smc') {
                    core = 'snes'; 
                } else if (ext === 'nes') {
                    core = 'nes';  
                } else if (ext === 'gb' || ext === 'gbc') {
                    core = 'gb';   
                }
            }
            window.EJS_core = core; 
            
            // 2. 核心存档设置
            window.EJS_gameName = romFile;
            
            // 3. 语言设置
            window.EJS_language = 'en';
            
            window.EJS_gameUrl = '../rom/' + romFile; 
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';

            window.EJS_color = '#000000'; 
            window.EJS_startOnLoaded = true; 
            window.EJS_Buttons = {
                playPause: false, 
                restart: true,
                mute: true,
                settings: true, // 这个必须是 true，这是改键位的入口！
                fullscreen: false 
            };

            // 【黑科技保留】：游戏启动完毕后，强制抢夺系统键盘焦点
            window.EJS_onGameStart = function() {
                console.log("[Tukuai OS] 游戏已启动，正在强制获取键盘焦点...");
                window.focus(); // 强制焦点移入 iframe
                // 尝试让模拟器底层的 canvas 标签直接获取焦点
                setTimeout(() => {
                    const canvas = document.querySelector('#game canvas');
                    if(canvas) {
                        canvas.focus();
                    }
                }, 500); // 稍微延迟等它渲染完
            };
        }
    </script>
    
    <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>

    <script>
        // 【核心修改点：加入跨窗口通信监听】
        window.addEventListener('message', (event) => {
            if (event.data === 'focus-emulator') {
                const canvas = document.querySelector('canvas');
                if (canvas) {
                    canvas.setAttribute('tabindex', '0'); // 确保 canvas 可被聚焦
                    canvas.focus();
                    console.log("[EmulatorJS] 收到主页面焦点同步指令");
                }
            }
        });

        // 页面加载完成后，告诉父级窗口自己准备好了
        window.addEventListener('load', () => {
            if (window.parent) {
                window.parent.postMessage('emulator-ready', '*');
            }
        });
    </script>
</body>
</html>
