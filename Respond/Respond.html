<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能招标文档响应生成器</title>
    <!-- 设置网站图标 -->
    <link rel="icon" href="imgs/good.ico">
    <style>
        :root {
            --primary-color: #3b82f6; /* 科技蓝 */
            --primary-hover: #2563eb;
            --bg-color: #0f172a;      /* 深色背景 */
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --border-color: #334155;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 顶部 Hero 区域 */
        header {
            text-align: center;
            padding: 5rem 2rem 4rem;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(59, 130, 246, 0.2);
            padding: 0 10px;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #94a3b8;
            max-width: 650px;
            margin: 0 auto 2.5rem auto;
            padding: 0 15px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-download:hover {
            background-color: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .download-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 内容展示区 */
        .gallery {
            max-width: 1200px;
            margin: -2rem auto 4rem;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            gap: 3rem;
            position: relative;
            z-index: 10;
        }

        .feature-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
        }

        .feature-card h2 {
            font-size: 1.5rem;
            color: #e2e8f0;
            margin-bottom: 1.5rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .feature-card h2::before, .feature-card h2::after {
            content: "";
            height: 2px;
            width: 40px;
            background-color: var(--primary-color);
            display: inline-block;
            border-radius: 2px;
        }

        /* 统一图片容器尺寸与缩略图表现 */
        .img-container {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: #0f172a;
            width: 100%;
            aspect-ratio: 16 / 9; /* 宽屏预览图统一比例 */
            position: relative;
        }

        .compare-box .img-container {
            aspect-ratio: 4 / 3; /* 文档对比图采用 4:3 比例，视觉更协调 */
        }

        .feature-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保证图片填满容器且长度一致 */
            object-position: top center; /* 裁剪时优先保留顶部重要信息 */
            display: block;
            transition: transform 0.3s ease;
        }
        
        .feature-card img:hover {
            transform: scale(1.03);
        }

        .desc {
            text-align: center;
            color: #94a3b8;
            margin-top: 1.2rem;
            font-size: 0.95rem;
        }

        /* 对比区域 */
        .compare-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: stretch;
        }

        .compare-box {
            display: flex;
            flex-direction: column;
        }

        .compare-box h3 {
            color: #cbd5e1;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-align: center;
            padding: 0.5rem;
            background-color: #0f172a;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        /* 手机端深度适配 */
        @media (max-width: 768px) {
            header { 
                padding: 3rem 1rem 2.5rem; 
            }
            h1 { 
                font-size: 1.8rem; 
            }
            .subtitle { 
                font-size: 1rem; 
                margin-bottom: 2rem;
            }
            .btn-download {
                font-size: 1.1rem;
                padding: 0.8rem 2rem;
            }
            .gallery {
                padding: 0 1rem;
                margin-top: -1.5rem;
                gap: 1.5rem;
            }
            .feature-card {
                padding: 1.2rem;
            }
            .feature-card h2 {
                font-size: 1.3rem;
            }
            .feature-card h2::before, .feature-card h2::after {
                width: 25px;
            }
            .compare-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .compare-box .img-container {
                aspect-ratio: 16 / 10; /* 手机端适度压低对比图高度，避免单图占据整个屏幕 */
            }
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #64748b;
            border-top: 1px solid var(--border-color);
            background-color: #0f172a;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>智能招标文档响应生成器</h1>
        <p class="subtitle">一键批量处理招标参数，智能化生成对比响应表，极大地提升您的文档处理效率与准确度。</p>
        
        <!-- 下载按钮链接 -->
        <a href="https://github.com/GallantTarry/javaswing-zbdlxyscq1.2-app/releases/download/%E5%93%8D%E5%BA%94%E7%94%9F%E6%88%90%E5%99%A8/1.2.exe" class="btn-download">
            <svg class="download-icon" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            下载 v1.2 版本
        </a>
    </header>

    <div class="gallery">
        <!-- 软件界面预览 -->
        <div class="feature-card">
            <h2>运行界面</h2>
            <div class="img-container">
                <img src="imgs/预览图.png" alt="软件界面预览图">
            </div>
            <p class="desc">极简的交互设计，支持拖拽文件识别，右侧提供实时处理日志监控。</p>
        </div>

        <!-- 响应效果对比 -->
        <div class="feature-card">
            <h2>自动响应效果对比</h2>
            <div class="compare-container">
                <!-- 处理前 -->
                <div class="compare-box">
                    <h3>处理前 (原始招标文件)</h3>
                    <div class="img-container">
                        <img src="imgs/测试文件.png" alt="测试文件 - 处理前">
                    </div>
                </div>
                
                <!-- 处理后 -->
                <div class="compare-box">
                    <h3>处理后 (一键生成响应表)</h3>
                    <div class="img-container">
                        <img src="imgs/响应成功.png" alt="响应成功 - 处理后">
                    </div>
                </div>
            </div>
            <p class="desc">精准识别表格参数，自动回填“投标人响应值”，完美复刻原表格式。</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 智能招标文档响应生成器. 为高效办公而生.</p>
    </footer>

</body>
</html>
