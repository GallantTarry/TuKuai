<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WL_PORTFOLIO // OS</title>
    
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { pixel: ['"Press Start 2P"', 'cursive'] },
                    colors: {
                        themeDark: '#0f172a',
                        themePanel: '#1e293b',
                        themeAccent: '#38bdf8'
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #000; 
            color: #f8fafc; 
            margin: 0;
            overflow: hidden;
        }
        .nav-item {
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .nav-item:hover {
            background-color: #334155;
            border-color: #475569;
        }
        .nav-active {
            background-color: #0f172a;
            border-color: #38bdf8;
            box-shadow: inset 0 0 10px rgba(56, 189, 248, 0.2);
        }
        .pixel-panel {
            background-color: rgba(15, 23, 42, 0.85);
            border: 2px solid #38bdf8;
            backdrop-filter: blur(4px);
        }
        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
        }
    </style>
</head>
<body class="font-pixel text-[10px] md:text-xs">

    <div id="app" class="flex h-screen w-screen">
        
        <aside class="w-64 md:w-80 bg-themePanel border-r-4 border-themeDark flex flex-col z-20 shadow-2xl relative">
            <div class="p-6 border-b-4 border-themeDark bg-slate-800">
                <div class="flex items-center space-x-3">
                    
                    <div class="w-10 h-10 bg-[#0f172a] rounded-sm border-2 border-themeAccent flex items-center justify-center shrink-0 shadow-[0_0_8px_rgba(56,189,248,0.4)] overflow-hidden">
                        <svg viewBox="0 0 16 16" class="w-full h-full" style="image-rendering: pixelated;">
                            <rect x="3" y="4" width="1" height="5" fill="#292524"/>
                            <rect x="12" y="4" width="1" height="5" fill="#292524"/>
                            
                            <rect x="4" y="5" width="8" height="5" fill="#fed7aa"/>
                            <rect x="4" y="9" width="8" height="1" fill="#fdba74"/>
                            <rect x="6" y="9" width="2" height="1" fill="#f97316"/>
                            
                            <rect x="5" y="7" width="2" height="1" fill="#1c1917"/>
                            <rect x="9" y="7" width="2" height="1" fill="#1c1917"/>
                            
                            <rect x="4" y="2" width="8" height="3" fill="#292524"/>
                            <rect x="5" y="1" width="2" height="1" fill="#292524"/>
                            <rect x="8" y="1" width="3" height="1" fill="#292524"/>
                            <rect x="4" y="5" width="2" height="1" fill="#292524"/>
                            <rect x="7" y="5" width="2" height="1" fill="#292524"/>
                            <rect x="11" y="5" width="1" height="1" fill="#292524"/>

                            <rect x="1" y="9" width="5" height="1" fill="#f8fafc"/>
                            <rect x="0" y="9" width="1" height="1" fill="#ef4444"/> <rect x="2" y="11" width="12" height="5" fill="#475569"/>
                            <rect x="3" y="10" width="10" height="1" fill="#475569"/>
                            
                            <rect x="6" y="10" width="4" height="1" fill="#fdba74"/>
                            
                            <rect x="4" y="10" width="2" height="2" fill="#334155"/>
                            <rect x="10" y="10" width="2" height="2" fill="#334155"/>
                            <rect x="5" y="11" width="1" height="3" fill="#94a3b8"/>
                            <rect x="10" y="11" width="1" height="3" fill="#94a3b8"/>
                            <rect x="7" y="12" width="2" height="4" fill="#334155"/>

                            <rect x="0" y="7" width="2" height="1" fill="#e2e8f0" opacity="0">
                                <animate attributeName="y" values="7;3;-1" dur="2.5s" repeatCount="indefinite"/>
                                <animate attributeName="x" values="0;-1;1" dur="2.5s" repeatCount="indefinite"/>
                                <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/>
                            </rect>
                            <rect x="-1" y="5" width="1" height="2" fill="#94a3b8" opacity="0">
                                <animate attributeName="y" values="5;1;-3" dur="3s" repeatCount="indefinite"/>
                                <animate attributeName="x" values="-1;1;-1" dur="3s" repeatCount="indefinite"/>
                                <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
                            </rect>
                        </svg>
                    </div>

                    <span class="text-sm tracking-widest text-sky-400">土块</span>
                </div>
                <div class="mt-2 text-gray-400 text-[8px]">For Love | now : smoking</div>
            </div>

            <nav class="flex-1 p-4 space-y-3 overflow-y-auto">
                <button 
                    v-for="item in menuItems" 
                    :key="item.id"
                    @click="currentTab = item.id"
                    :class="['w-full text-left p-4 rounded-sm nav-item flex items-center', currentTab === item.id ? 'nav-active text-themeAccent' : 'text-gray-300']"
                >
                    <span class="mr-3 text-lg">{{ item.icon }}</span>
                    <span>{{ item.title }}</span>
                </button>
            </nav>

            <div class="p-4 border-t-4 border-themeDark text-[8px] text-gray-500">
                <p>OS VERSION 1.0.0</p>
                <p>WE ARE ALL GREAT APES</p>
            </div>
        </aside>

        <main class="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
            
            <img 
                src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2000&auto=format&fit=crop" 
                alt="Pixel Room Background" 
                class="absolute inset-0 w-full h-full object-cover opacity-60"
            />
            
            <div class="absolute inset-0 scanlines z-10"></div>

            <div class="relative z-20 w-3/4 max-w-2xl pixel-panel p-6 rounded-sm">
                
                <div v-if="currentTab === 'about'" class="space-y-4">
                    <h2 class="text-lg text-themeAccent mb-4">> 身份档案</h2>
                    
                    <div class="flex flex-wrap gap-y-2 gap-x-2 text-gray-200 text-[10px] leading-relaxed">
                        <span>TuKuai /</span>
                        <span>Swimmer /</span>
                        <span>Artist /</span>
                        <span>Geek /</span>
                        <span>Gamer /</span>
                        <span>Smoker /</span>
                        <span>Photographer /</span>
                        <span>Voyager /</span>
                        <span>Traveler /</span>
                        <span>Writer /</span>
                        <span>Historian /</span>
                        <span>Drifter.</span>
                    </div>

                    <p class="leading-loose text-gray-400 mt-4">
                        为纪念我曾爱过的一切。
                    </p>
                </div>

                <div v-if="currentTab === 'online'" class="space-y-4">
                    <h2 class="text-lg text-green-400 mb-4">> 在线工具</h2>
                    
                    <div class="flex items-center justify-between border-b border-gray-700 pb-2 hover:bg-gray-800/50 transition-colors px-2 rounded">
                        <div class="flex flex-col space-y-1">
                            <span class="text-gray-300">信息协同数据校对助手</span>
                            <span class="text-[8px] text-gray-500">支持实时数据同步与分析</span>
                        </div>
                        <a href="./checkpanel/checkpanel.html" target="_blank" class="text-green-400 hover:text-white cursor-pointer px-3 py-1 border border-green-400 hover:border-white rounded-sm transition-colors">
                            启动 ↗
                        </a>
                    </div>
                </div>

                <div v-if="currentTab === 'download'" class="space-y-4">
                    <h2 class="text-lg text-yellow-400 mb-4">> 资源库</h2>
                    
                    <div class="flex items-center justify-between border-b border-gray-700 pb-2 hover:bg-gray-800/50 transition-colors px-2 rounded">
                        <span class="text-gray-300">1.代理助手1.7.1.exe</span>
                        <a href="https://github.com/ImShaoXiaBieZou/DESKTOP/releases/download/files%E4%B8%8B%E7%9A%84%E6%96%87%E4%BB%B6/DAILIZHUSHOU1.7.1.exe" download class="text-yellow-400 hover:text-white cursor-pointer">⬇ 下载</a>
                    </div>
                    
                    <div class="flex items-center justify-between border-b border-gray-700 pb-2 hover:bg-gray-800/50 transition-colors px-2 rounded mt-2">
                        <span class="text-gray-300">2.招标文档响应生成器1.2.exe</span>
                        <a href="https://github.com/ImShaoXiaBieZou/DESKTOP/releases/download/files%E4%B8%8B%E7%9A%84%E6%96%87%E4%BB%B6/ZHAOBIAOWENDANGXIANGYINGSHENGCHENGQI1.2.exe" download class="text-yellow-400 hover:text-white cursor-pointer">⬇ 下载</a>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const menuItems = ref([
                    { id: 'about', title: '我的简介', icon: '👤' },
                    { id: 'online', title: '在线使用', icon: '⚡' },
                    { id: 'download', title: '文件下载', icon: '📁' }
                ]);

                const currentTab = ref('about');

                return {
                    menuItems,
                    currentTab
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
