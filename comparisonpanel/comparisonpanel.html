<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
    <title>公告比对助手</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
        }

        body {
            background: url('texture2.png') center center / cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .comparison-panel {
            width: 90%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 50px 60px 40px 60px;
        }

        /* --- 顶部操作区域 --- */
        .drop-panel {
            display: flex;
            gap: 60px;
            height: 150px;
            flex-shrink: 0;
        }

        .drop-box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer; /* 增加手型光标，提示可点击 */
        }

        .drop-box.dragover {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
            transform: scale(1.02);
        }

        /* --- 中部日志区域 --- */
        .log-container {
            flex: 1;
            margin: 40px 0;
            display: flex;
            min-height: 200px; /* 防止在小屏幕被过度挤压 */
        }

        #log-area {
            flex: 1;
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            resize: none;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            outline: none;
            line-height: 1.5;
        }
        
        #log-area::-webkit-scrollbar { width: 8px; }
        #log-area::-webkit-scrollbar-track { background: transparent; }
        #log-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }

        /* --- 底部按钮区域 --- */
        .btn-panel {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-shrink: 0;
        }

        .btn {
            width: 180px;
            height: 50px;
            font-size: 15px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-run { background-color: #e74c3c; }
        .btn-run:hover { background-color: #f16253; }
        .btn-run:active { background-color: #c0392b; }

       

        /* =========================================
           核心修改：移动端响应式适配 (屏幕宽度 <= 768px)
           ========================================= */
        @media (max-width: 768px) {
            .comparison-panel {
                width: 95%;
                height: 95vh;
                padding: 20px 15px; /* 缩小外边距 */
            }

            .drop-panel {
                flex-direction: column; /* 左右并排改为上下堆叠 */
                gap: 15px; /* 减小间距 */
                height: auto; /* 高度自适应 */
            }

            .drop-box {
                padding: 25px 10px; /* 增加内边距撑开高度 */
                font-size: 14px; /* 字体稍微缩放 */
                border-radius: 20px;
            }

            .log-container {
                margin: 20px 0; /* 减小日志框上下的距离 */
            }

            #log-area {
                font-size: 14px;
                padding: 12px 15px;
            }

            .btn-panel {
                flex-direction: column; /* 按钮改为上下堆叠 */
                gap: 15px;
                align-items: center; /* 居中对齐 */
            }

            .btn {
                width: 100%; /* 按钮宽度占满父容器 */
                max-width: 300px; /* 限制最大宽度，避免太长 */
                height: 45px;
            }
        }
    </style>
</head>
<body>

<div class="comparison-panel">
    <div class="drop-panel">
        <div class="drop-box" id="drop-word">【请拖入或点击上传 DOCX】</div>
        <input type="file" id="input-word" accept=".docx" style="display: none;">
        
        <div class="drop-box" id="drop-pdf">【拖入或点击上传 PDF】</div>
        <input type="file" id="input-pdf" accept=".pdf" style="display: none;">
    </div>

    <div class="log-container">
        <textarea id="log-area" readonly>>>> halo！等待您的启动ty！&#13;&#10;</textarea>
    </div>

    <div class="btn-panel">
        <button class="btn btn-run" id="btn-run">开始校对</button>
    </div>
</div>

<script>
    // --- 状态与变量 ---
    let wordFile = null;
    let pdfFile = null;
    const logArea = document.getElementById('log-area');

    // --- 日志系统 ---
    function log(msg) {
        logArea.value += msg + "\n";
        logArea.scrollTop = logArea.scrollHeight;
    }

    // --- 拖拽与点击上传双重绑定机制 ---
    function setupFileInteraction(boxId, inputId, isWord) {
        const box = document.getElementById(boxId);
        const input = document.getElementById(inputId);
        
        // 1. 点击触发文件选择 (核心手机端支持)
        box.addEventListener('click', () => {
            input.click();
        });

        // 2. 处理文件选择后的逻辑
        const handleFile = (file) => {
            if (!file) return;
            if (isWord) {
                wordFile = file;
            } else {
                pdfFile = file;
            }
            box.innerHTML = `★ 已装载<br/>${file.name}`;
        };

        // 监听点击弹窗选择的文件
        input.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // 监听拖拽 (保留电脑端体验)
        box.addEventListener('dragover', (e) => {
            e.preventDefault();
            box.classList.add('dragover');
        });

        box.addEventListener('dragleave', () => {
            box.classList.remove('dragover');
        });

        box.addEventListener('drop', (e) => {
            e.preventDefault();
            box.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
    }

    // 初始化交互绑定
    setupFileInteraction('drop-word', 'input-word', true);
    setupFileInteraction('drop-pdf', 'input-pdf', false);

    // --- 文件读取逻辑 (借助 Mammoth 和 PDF.js) ---
    async function readWord(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                mammoth.extractRawText({arrayBuffer: arrayBuffer})
                    .then(result => resolve(result.value))
                    .catch(err => reject(err));
            };
            reader.readAsArrayBuffer(file);
        });
    }

    async function readPdf(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = '';
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const strings = content.items.map(item => item.str);
            text += strings.join('') + '\n';
        }
        return text;
    }

    // --- 核心正则匹配与校验逻辑 ---
    function findMatch(text, regexStr) {
        const regex = new RegExp(regexStr);
        const match = text.match(regex);
        return match ? match[1] : null;
    }

    function normalizeTime(raw) {
        if (!raw) return "";
        const regex = /(\d{4})[年-]?(\d{1,2})[月-]?(\d{1,2})日?\s*(上午|下午)?\s*(\d{1,2})[时:]?(\d{1,2})?分?/;
        const m = raw.match(regex);
        if (m) {
            let year = parseInt(m[1]);
            let month = parseInt(m[2]);
            let day = parseInt(m[3]);
            let ampm = m[4];
            let hour = parseInt(m[5]);
            let min = m[6] ? parseInt(m[6]) : 0;

            if (ampm === "下午" && hour < 12) hour += 12;
            if (ampm === "上午" && hour === 12) hour = 0;

            const pad = (num) => String(num).padStart(2, '0');
            return `${year}${pad(month)}${pad(day)}${pad(hour)}${pad(min)}`;
        }
        return raw.replace(/[^0-9]/g, "");
    }

    function checkResult(w, p, lab) {
        if (!w || !p) {
            log(`⚠️ ${lab} 提取失败`);
            return false;
        }
        const match = w.trim().toLowerCase() === p.trim().toLowerCase();
        log(`${lab} -> Word:[${w.trim()}] vs PDF:[${p.trim()}] -> ${match ? "★一致" : "▲冲突"}`);
        return match;
    }

    function checkTimeResult(wt, pt, lab) {
        if (!wt || !pt) {
            log(`⚠️ ${lab} 提取数据缺失`);
            return false;
        }
        const nW = normalizeTime(wt);
        const nP = pt.replace(/[^0-9]/g, "");
        const match = nP.startsWith(nW);
        log(`${lab} -> Word:[${nW}] vs PDF:[${nP}] -> ${match ? "★一致" : "▲冲突"}`);
        return match;
    }

    async function executeCompare(wText, pText) {
        log("--- 终于完成啦！ ---");
        let isAllPassed = true;

        // 【终极修复：项目编号 - 白名单模式】
        let wNo = findMatch(wText, "(?:采购项目编号|招标编号|采购编号)[:：]?\\s*([A-Za-z0-9\\-]+)");
        let pNo = findMatch(pText, "(?:采购项目编号|招标编号|采购编号)[:：]?\\s*([A-Za-z0-9\\-]+)");

        if (wNo) wNo = wNo.trim();
        if (pNo) pNo = pNo.trim();

        if (!checkResult(wNo, pNo, "【项目编号】")) {
            isAllPassed = false;
        }

        const wc = wText.replace(/\s/g, "");
        const pc = pText.replace(/\s/g, "");

        // 【获取截止时间】
        let wT1 = findMatch(wc, "至(\\d{4}年\\d{1,2}月\\d{1,2}日(上午|下午)?\\d{1,2}时(?:\\d{1,2}分)?)");
        let pT1 = findMatch(pc, "(?:采购文件获取截止时间|获取时间.*?到)(\\d{4}[年-]\\d{1,2}[月-]\\d{1,2}日?\\s*(?:上午|下午)?\\d{1,2}时?\\s*(?::|分)?\\d{1,2}分?)");

        if (!checkTimeResult(wT1, pT1, "【获取截止时间】")) {
            isAllPassed = false;
        }

        // 【应答截止时间】
        let wT2 = findMatch(wc, "截止时间.*?(\\d{4}年\\d{1,2}月\\d{1,2}日(上午|下午)?\\d{1,2}时\\d{1,2}分)");
        let pT2 = findMatch(pc, "(?:开启应答文件时间|递交截止时间|首次应答文件提交的截止时间).*?(\\d{4}[年-]\\d{1,2}[月-]\\d{1,2}日?\\s*(?:上午|下午)?\\d{1,2}时?\\s*(?::|分)?\\d{1,2}分?)");

        if (!checkTimeResult(wT2, pT2, "【应答截止时间】")) {
            isAllPassed = false;
        }

        setTimeout(() => {
            if (isAllPassed) {
                alert("★ 成功！所有元素完全一致。");
            } else {
                alert("▲ 失败！存在不一致的信息，请查看详情日志。");
            }
        }, 100);
    }

    // --- 按钮事件 ---
    document.getElementById('btn-run').addEventListener('click', async () => {
        if (!wordFile || !pdfFile) {
            log("▲ 请先上传文件！");
            return;
        }
        log(">>> 正在努力打工...");
        
        try {
            const [wText, pText] = await Promise.all([readWord(wordFile), readPdf(pdfFile)]);
            executeCompare(wText, pText);
        } catch (ex) {
            log("▲ 出错: 可能是文件读取失败或格式不正确！" + ex.message);
        }
    });

    );

</script>
</body>
</html>
